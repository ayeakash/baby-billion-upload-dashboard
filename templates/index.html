<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BabyBillion Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        /* ═══════════════════════════════════════════════════════════════
           Material You Dark Theme — Tonal Palette
           ═══════════════════════════════════════════════════════════════ */
        :root {
            /* M3 Dark Scheme — Refined Palette */
            --md-sys-color-background: #0D0D11;
            --md-sys-color-on-background: #E6E3E8;
            --md-sys-color-surface: #0D0D11;
            --md-sys-color-surface-dim: #0D0D11;
            --md-sys-color-surface-container-lowest: #08080B;
            --md-sys-color-surface-container-low: #161619;
            --md-sys-color-surface-container: #1C1B20;
            --md-sys-color-surface-container-high: #262529;
            --md-sys-color-surface-container-highest: #313035;
            --md-sys-color-on-surface: #E6E3E8;
            --md-sys-color-on-surface-variant: #CAC8CE;
            --md-sys-color-outline: #918F96;
            --md-sys-color-outline-variant: #3E3E43;

            /* Primary — Vibrant Indigo */
            --md-sys-color-primary: #A8B8FF;
            --md-sys-color-on-primary: #162454;
            --md-sys-color-primary-container: #2D3F6E;
            --md-sys-color-on-primary-container: #D6DEFF;
            --md-sys-color-primary-glow: rgba(168, 184, 255, 0.15);

            /* Secondary */
            --md-sys-color-secondary: #BFC6DC;
            --md-sys-color-on-secondary: #293042;
            --md-sys-color-secondary-container: #3F4759;
            --md-sys-color-on-secondary-container: #DBE1F9;

            /* Tertiary — Orchid accent */
            --md-sys-color-tertiary: #E0B8E5;
            --md-sys-color-on-tertiary: #3F2844;
            --md-sys-color-tertiary-container: #573E5C;

            /* Error */
            --md-sys-color-error: #FFB4AB;
            --md-sys-color-on-error: #690005;
            --md-sys-color-error-container: #93000A;

            /* Custom semantic */
            --md-custom-color-success: #7EDBA5;
            --md-custom-color-success-container: #122E1E;
            --md-custom-color-warning: #F0C878;
            --md-custom-color-warning-container: #3D3018;

            /* Elevation */
            --md-sys-elevation-1: 0 1px 3px 1px rgba(0,0,0,0.2), 0 1px 2px 0 rgba(0,0,0,0.35);
            --md-sys-elevation-2: 0 2px 6px 2px rgba(0,0,0,0.2), 0 1px 2px 0 rgba(0,0,0,0.35);
            --md-sys-elevation-3: 0 6px 16px 4px rgba(0,0,0,0.25), 0 2px 4px 0 rgba(0,0,0,0.4);

            /* Shape */
            --md-sys-shape-xs: 4px;
            --md-sys-shape-sm: 8px;
            --md-sys-shape-md: 12px;
            --md-sys-shape-lg: 16px;
            --md-sys-shape-xl: 28px;
            --md-sys-shape-full: 100px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Roboto', system-ui, sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════════════════════════
           TOP APP BAR
           ═══════════════════════════════════════════════════════════════ */
        header {
            padding: 0.75rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(22,21,27,0.92), rgba(16,15,20,0.96));
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border-bottom: 1px solid rgba(168,184,255,0.08);
            z-index: 10;
            position: sticky;
            top: 0;
            gap: 1rem;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 34px; height: 34px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--md-sys-color-primary-container), var(--md-sys-color-tertiary-container));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 12px rgba(168,184,255,0.15);
        }
        .logo-icon svg { width: 18px; height: 18px; stroke: var(--md-sys-color-on-primary-container); }

        .logo-text h1 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
            line-height: 1.2;
        }
        .logo-text p {
            font-size: 0.68rem;
            color: var(--md-sys-color-outline);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ═══════════════════════════════════════════════════════════════
           BUTTONS — M3 Filled, Tonal, Outlined, Text
           ═══════════════════════════════════════════════════════════════ */
        .btn {
            font-family: 'Inter', 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            border-radius: var(--md-sys-shape-full);
            border: none;
            cursor: pointer;
            transition: background 0.2s ease, box-shadow 0.2s ease, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .btn:active:not(:disabled) { opacity: 0.85; }
        .btn:disabled { opacity: 0.38; cursor: not-allowed; }

        /* Filled */
        .btn-primary {
            background: linear-gradient(135deg, var(--md-sys-color-primary), #8BA0ED);
            color: var(--md-sys-color-on-primary);
        }
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 2px 12px var(--md-sys-color-primary-glow);
            filter: brightness(1.08);
        }

        /* Tonal */
        .btn-secondary {
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
        }
        .btn-secondary:hover:not(:disabled) {
            background: var(--md-sys-color-surface-container-highest);
        }

        /* Filled - Success */
        .btn-success {
            background: linear-gradient(135deg, var(--md-custom-color-success), #5DC08A);
            color: #0F1F15;
        }
        .btn-success:hover:not(:disabled) {
            box-shadow: 0 2px 12px rgba(126,219,165,0.2);
            filter: brightness(1.08);
        }

        /* Filled - Danger */
        .btn-danger {
            background: linear-gradient(135deg, var(--md-sys-color-error), #E8887E);
            color: var(--md-sys-color-on-error);
        }
        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 2px 12px rgba(255,180,171,0.2);
            filter: brightness(1.08);
        }

        /* Filled - Amber/Warning */
        .btn-amber {
            background: var(--md-custom-color-warning);
            color: #1F1A0E;
        }
        .btn-amber:hover:not(:disabled) {
            box-shadow: var(--md-sys-elevation-1);
        }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 50%;
            border-top-color: currentColor;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════════════════════════════
           STATUS CHIP
           ═══════════════════════════════════════════════════════════════ */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0.3rem 0.7rem;
            border-radius: var(--md-sys-shape-sm);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 0.2s;
            margin-right: 4px;
        }
        .status-pill.idle {
            background: var(--md-custom-color-success-container);
            color: var(--md-custom-color-success);
            box-shadow: 0 0 12px rgba(126,219,165,0.1);
        }
        .status-pill.batching {
            background: rgba(168, 184, 255, 0.1);
            color: var(--md-sys-color-primary);
            box-shadow: 0 0 12px var(--md-sys-color-primary-glow);
        }
        .status-pill.uploading {
            background: rgba(168, 184, 255, 0.1);
            color: var(--md-sys-color-primary);
            box-shadow: 0 0 16px var(--md-sys-color-primary-glow);
            animation: uploadGlow 2s ease-in-out infinite;
        }
        .status-pill.paused {
            background: var(--md-custom-color-warning-container);
            color: var(--md-custom-color-warning);
        }

        @keyframes uploadGlow {
            0%, 100% { box-shadow: 0 0 12px var(--md-sys-color-primary-glow); }
            50% { box-shadow: 0 0 22px var(--md-sys-color-primary-glow); }
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-pill.idle .status-dot { background: var(--md-custom-color-success); box-shadow: 0 0 6px var(--md-custom-color-success); animation: dotPulse 2.5s ease-in-out infinite; }
        .status-pill.batching .status-dot { background: var(--md-sys-color-primary); box-shadow: 0 0 6px var(--md-sys-color-primary); animation: dotPulse 1.5s ease-in-out infinite; }
        .status-pill.uploading .status-dot { background: var(--md-sys-color-primary); box-shadow: 0 0 8px var(--md-sys-color-primary); animation: dotPulse 1s ease-in-out infinite; }
        .status-pill.paused .status-dot { background: var(--md-custom-color-warning); box-shadow: 0 0 6px var(--md-custom-color-warning); animation: dotPulse 1.5s ease-in-out infinite; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* ═══════════════════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════════════════ */
        .main-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 1rem;
            gap: 0;
            max-height: calc(100vh - 56px);
            overflow: hidden;
        }

        .dashboard-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
            padding-right: 4px;
            min-height: 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           WARNING BANNER
           ═══════════════════════════════════════════════════════════════ */
        .warning-banner {
            background: rgba(255, 180, 171, 0.08);
            border: 1px solid rgba(255, 180, 171, 0.2);
            border-radius: var(--md-sys-shape-md);
            padding: 0.65rem 1rem;
            display: flex;
            align-items: center;
            color: var(--md-sys-color-error);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .warning-banner.hidden { display: none; }

        /* ═══════════════════════════════════════════════════════════════
           TABS — M3 style
           ═══════════════════════════════════════════════════════════════ */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            margin-bottom: 0.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .tabs-header { display: flex; gap: 0; }

        .tab-btn {
            font-family: 'Inter', 'Roboto', sans-serif;
            background: none;
            border: none;
            color: var(--md-sys-color-outline);
            padding: 0.65rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }
        .tab-btn:hover { color: var(--md-sys-color-on-surface); }
        .tab-btn.active { color: var(--md-sys-color-primary); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 12px; right: 12px;
            height: 3px;
            background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary));
            border-radius: 3px 3px 0 0;
            box-shadow: 0 0 8px var(--md-sys-color-primary-glow);
        }

        .tab-badge {
            background: var(--md-sys-color-surface-container-high);
            border-radius: var(--md-sys-shape-full);
            padding: 1px 7px;
            font-size: 0.68rem;
            font-weight: 500;
            margin-left: 4px;
            color: var(--md-sys-color-on-surface-variant);
        }
        .tab-btn.active .tab-badge {
            background: rgba(180, 197, 255, 0.15);
            color: var(--md-sys-color-primary);
        }

        /* ── Search ───────────────────────────────────────────────── */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            margin-bottom: 0.35rem;
        }
        .search-icon {
            position: absolute;
            left: 0.75rem;
            color: var(--md-sys-color-outline);
            pointer-events: none;
        }
        .search-input {
            width: 240px;
            padding: 0.45rem 0.8rem 0.45rem 2.1rem;
            border-radius: var(--md-sys-shape-full);
            background: var(--md-sys-color-surface-container-high);
            border: none;
            color: var(--md-sys-color-on-surface);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.25s ease;
        }
        .search-input::placeholder { color: var(--md-sys-color-outline); }
        .search-input:focus {
            background: var(--md-sys-color-surface-container-highest);
            outline: 2px solid var(--md-sys-color-primary);
            outline-offset: 0;
            width: 300px;
        }

        /* ═══════════════════════════════════════════════════════════════
           CARDS — M3 Filled Card
           ═══════════════════════════════════════════════════════════════ */
        .batches-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(145deg, var(--md-sys-color-surface-container), var(--md-sys-color-surface-container-low));
            border-radius: var(--md-sys-shape-lg);
            color: var(--md-sys-color-outline);
            border: 1px dashed var(--md-sys-color-outline-variant);
        }
        .empty-state svg { width: 40px; height: 40px; stroke: var(--md-sys-color-primary); margin-bottom: 0.75rem; opacity: 0.4; }

        .batch-card {
            background: var(--md-sys-color-surface-container);
            border-radius: var(--md-sys-shape-md);
            overflow: hidden;
            transition: background 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            border: 1px solid transparent;
            border-left: 3px solid var(--md-sys-color-outline-variant);
        }
        .batch-card:hover {
            background: var(--md-sys-color-surface-container-high);
            box-shadow: var(--md-sys-elevation-2);
            border-left-color: var(--md-sys-color-primary);
        }
        .batch-card.expanded {
            border-left-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px rgba(168,184,255,0.06), var(--md-sys-elevation-1);
        }

        .batch-summary {
            padding: 0.5rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .batch-meta-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .batch-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
        }

        .batch-status-badge {
            padding: 0.15rem 0.5rem;
            border-radius: var(--md-sys-shape-full);
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        .status-review {
            background: var(--md-custom-color-warning-container);
            color: var(--md-custom-color-warning);
        }
        .status-uploaded {
            background: rgba(180, 197, 255, 0.12);
            color: var(--md-sys-color-primary);
        }
        .status-finalized {
            background: var(--md-custom-color-success-container);
            color: var(--md-custom-color-success);
        }

        .batch-meta-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--md-sys-color-outline);
            font-size: 0.75rem;
        }
        .batch-meta-item { display: flex; align-items: center; gap: 4px; }
        .batch-meta-item svg { width: 14px; height: 14px; stroke: var(--md-sys-color-outline); }

        .expand-arrow {
            transition: transform 0.25s ease;
            opacity: 0.5;
        }
        .batch-card.expanded .expand-arrow { transform: rotate(180deg); }

        /* Smooth expand — CSS grid row trick avoids the max-height glitch */
        .batch-details {
            border-top: 1px solid var(--md-sys-color-outline-variant);
            background: var(--md-sys-color-surface-container-low);
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease;
        }
        .batch-card.expanded .batch-details {
            grid-template-rows: 1fr;
        }
        .batch-details > .batch-details-inner {
            overflow: hidden;
            padding: 0 0.75rem;
            transition: padding 0.3s ease;
        }
        .batch-card.expanded .batch-details > .batch-details-inner {
            padding: 0.5rem 0.75rem;
        }

        /* Action panel */
        .batch-action-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--md-sys-color-surface-container);
            padding: 0.5rem 0.625rem;
            border-radius: var(--md-sys-shape-sm);
            margin-bottom: 0.5rem;
            gap: 0.75rem;
        }
        .panel-info { display: flex; flex-direction: column; gap: 1px; }
        .panel-info-title {
            font-size: 0.65rem;
            color: var(--md-sys-color-outline);
            font-weight: 500;
            letter-spacing: 0.03em;
        }
        .panel-info-value {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
        }
        .panel-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

        /* ═══════════════════════════════════════════════════════════════
           VIDEO GRID
           ═══════════════════════════════════════════════════════════════ */
        .video-grid-header {
            display: grid;
            grid-template-columns: 2fr 1fr 0.5fr 1fr 0.5fr 1fr 0.7fr 0.6fr 0.5fr;
            padding: 0.25rem 0.5rem;
            color: var(--md-sys-color-outline);
            font-size: 0.58rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            border-bottom: 1px solid var(--md-sys-color-outline-variant);
        }

        .video-item {
            display: grid;
            grid-template-columns: 2fr 1fr 0.5fr 1fr 0.5fr 1fr 0.7fr 0.6fr 0.5fr;
            padding: 0.3rem 0.5rem;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.75rem;
            transition: background 0.1s;
        }
        .video-item:hover { background: rgba(255,255,255,0.025); }

        .video-name-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            overflow: hidden;
        }

        .play-icon-btn {
            background: var(--md-sys-color-primary-container);
            border: none;
            color: var(--md-sys-color-on-primary-container);
            width: 22px; height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .play-icon-btn:hover {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
        }

        .video-meta-cell {
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.68rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        /* Editable title (contenteditable) */
        .video-meta-cell.text-edit {
            cursor: text;
            padding: 1px 4px;
            border-radius: 3px;
            border: 1px solid transparent;
            transition: border-color 0.15s, background 0.15s;
        }
        .video-meta-cell.text-edit:hover {
            border-color: var(--md-sys-color-outline-variant);
            background: rgba(255,255,255,0.03);
        }
        .video-meta-cell.text-edit:focus {
            outline: none;
            border-color: var(--md-sys-color-primary);
            background: var(--md-sys-color-surface-container-high);
            white-space: normal;
            overflow: visible;
        }
        /* Dropdown trigger cell */
        .cell-dropdown-trigger {
            cursor: pointer;
            padding: 1px 4px;
            border-radius: 3px;
            border: 1px solid transparent;
            transition: border-color 0.15s, background 0.15s;
            position: relative;
        }
        .cell-dropdown-trigger:hover {
            border-color: var(--md-sys-color-outline-variant);
            background: rgba(255,255,255,0.04);
        }
        .cell-dropdown-trigger.active {
            border-color: var(--md-sys-color-primary);
            background: var(--md-sys-color-surface-container-high);
        }
        /* Dropdown overlay */
        .cell-dropdown-panel {
            position: fixed;
            background: var(--md-sys-color-surface-container-high);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--md-sys-shape-sm);
            box-shadow: var(--md-sys-elevation-2);
            z-index: 9999;
            min-width: 160px;
            max-width: 280px;
            max-height: 220px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cell-dropdown-search {
            padding: 5px 8px;

        }
        .cell-dropdown-item.selected {

        }
        .cell-saving {

        /* ── Bad video row ─────────────────────────────────────── */
        .video-item.bad {

        }
        .video-item.bad .video-name-cell {

        .mark-bad-btn {

            color: var(--md-sys-color-primary);

        .video-item.bad .mark-bad-btn:hover {
            color: var(--md-sys-color-primary);
            background: rgba(180, 197, 255, 0.1);
        }

        /* ═══════════════════════════════════════════════════════════════
           CONSOLE DRAWER — Collapsible bottom panel
           ═══════════════════════════════════════════════════════════════ */
        .log-section {
            flex-shrink: 0;

            border-radius: var(--md-sys-shape-md) var(--md-sys-shape-md) 0 0;

        }
        .log-terminal-wrap {

        .log-section.expanded .log-terminal-wrap {

        }

        .log-header {
            padding: 0.45rem 0.875rem;

            border-bottom: 1px solid var(--md-sys-color-outline-variant);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            user-select: none;
        }
        .log-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .log-header h2 {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--md-sys-color-outline);
            letter-spacing: 0.03em;
        }
        .log-badge {
            font-size: 0.6rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface-variant);
            background: var(--md-sys-color-surface-container-high);
            padding: 1px 6px;
            border-radius: var(--md-sys-shape-full);

            overflow: hidden;
            text-overflow: ellipsis;

        }
        .expand-console-icon {
            width: 16px; height: 16px;
            transition: transform 0.2s ease;
            color: var(--md-sys-color-outline);
        }

            transform: rotate(180deg);

        .log-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .log-controls label {
            font-size: 0.68rem;

            align-items: center;
            gap: 4px;
            cursor: pointer;

        .log-controls label input[type="checkbox"] {
            accent-color: var(--md-sys-color-primary);

        .log-terminal {

        /* ═══════════════════════════════════════════════════════════════
           VIDEO MODAL — Fixed: object-fit contain
           ═══════════════════════════════════════════════════════════════ */
        /* ═══════════════════════════════════════════════════════════════
           VIDEO MODAL — Plyr player in overlay
           ═══════════════════════════════════════════════════════════════ */
        .video-modal {
            position: fixed;
            top: 0; left: 0;

            background: rgba(0, 0, 0, 0.80);
            z-index: 100;

            align-items: center;

        }
        .video-modal.active { display: flex; }

        .video-modal-inner {

            width: 50vw;

            max-height: 85vh;

            flex-direction: column;
            background: var(--md-sys-color-surface-container-high);

        .video-modal-header {

        .video-modal-header .modal-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--md-sys-color-on-surface);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .video-modal-header .modal-close {
            background: var(--md-sys-color-surface-container-highest);
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            font-size: 1.1rem;
            cursor: pointer;
            width: 28px; height: 28px;

        .video-modal-inner .plyr {

            --plyr-color-main: var(--md-sys-color-primary);

            max-height: calc(85vh - 48px);
        }
        .video-modal-inner video {
            max-height: calc(85vh - 48px);
        }

        /* ═══════════════════════════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--md-sys-color-outline); }

        /* Checkbox label */
        .header-checkbox-label {
            font-size: 0.75rem;
            color: var(--md-sys-color-outline);
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
            padding: 0.3rem 0.5rem;
            border-radius: var(--md-sys-shape-sm);
        }
        .header-checkbox-label:hover { background: rgba(255,255,255,0.04); }
        .header-checkbox-label input[type="checkbox"] {
            accent-color: var(--md-sys-color-primary);
        }

        /* Batch size selector */
        .batch-size-group {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: var(--md-sys-color-outline);
        }
        .batch-size-select {
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            padding: 0.25rem 0.4rem;
            border-radius: var(--md-sys-shape-sm);
            border: 1px solid var(--md-sys-color-outline-variant);
            background: var(--md-sys-color-surface-container-high);
            color: var(--md-sys-color-on-surface);
            cursor: pointer;
            outline: none;
        }
        .batch-size-select:focus { border-color: var(--md-sys-color-primary); }

        /* ═══════════════════════════════════════════════════════════════
           TOAST NOTIFICATIONS
           ═══════════════════════════════════════════════════════════════ */
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column-reverse;
            gap: 0.5rem;
            z-index: 9999;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            background: var(--md-sys-color-surface-container-highest);
            border: 1px solid var(--md-sys-color-outline-variant);
            border-radius: var(--md-sys-shape-md);
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 260px;
            max-width: 420px;
            box-shadow: var(--md-sys-elevation-3);
            animation: toastIn 0.3s ease forwards;
            font-size: 0.78rem;
            color: var(--md-sys-color-on-surface);
        }
        .toast.toast-out {
            animation: toastOut 0.25s ease forwards;
        }
        .toast-icon {
            width: 18px; height: 18px;
            flex-shrink: 0;
        }
        .toast-body {
            flex: 1;
            min-width: 0;
        }
        .toast-title {
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 1px;
        }
        .toast-msg {
            font-size: 0.7rem;
            color: var(--md-sys-color-on-surface-variant);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast-progress {
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: var(--md-sys-color-outline-variant);
            overflow: hidden;
            margin-top: 4px;
        }
        .toast-progress-bar {
            height: 100%;
            border-radius: 2px;
            background: var(--md-sys-color-primary);
            animation: progressIndeterminate 1.8s ease-in-out infinite;
            width: 40%;
        }
        .toast-progress-bar.success {
            background: var(--md-custom-color-success);
            animation: none;
            width: 100%;
            transition: width 0.3s ease;
        }
        .toast-progress-bar.error {
            background: var(--md-sys-color-error);
            animation: none;
            width: 100%;
            transition: width 0.3s ease;
        }
        .toast.info { border-left: 3px solid var(--md-sys-color-primary); }
        .toast.success { border-left: 3px solid var(--md-custom-color-success); }
        .toast.error { border-left: 3px solid var(--md-sys-color-error); }
        .toast.progress { border-left: 3px solid var(--md-sys-color-primary); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0) scale(1); }
            to { opacity: 0; transform: translateY(8px) scale(0.97); }
        }
        @keyframes progressIndeterminate {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(150%); }
            100% { transform: translateX(250%); }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 0.5rem; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-start; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.25-2.5 3.5-2.5 3.5s2.25-1 3.5-2.5Z"/><path d="M12 10 9 13l-4-1 4-4Z"/><path d="M14 8V5L9 9Z"/><path d="M12 10a8 8 0 0 1 8-8v2c0 2-1 4-3 6Z"/><path d="M12 10v4h4a8 8 0 0 0-4-4Z"/><path d="m14 14-3 3-4-1 4-4Z"/><path d="M16 12v3l5-5Z"/></svg>
            </div>

        <div class="header-actions">

                    <option value="10">10 MB</option>

                    <option value="50">50 MB</option>

            <div class="batch-size-group">
                <span>Max batches</span>
                <input type="number" id="max-batches-input" class="batch-size-select" style="width:56px; text-align:center; font-weight:600;" value="10" min="1" max="999" title="Maximum number of batches to create per pipeline run">
            </div>
            <label class="header-checkbox-label">
                <input type="checkbox" id="batch-only-chk"> Batch-only
            </label>
            <button id="run-pipeline-btn" class="btn btn-primary" onclick="runPipelineBatching()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                Fetch &amp; Batch
            </button>
            <button id="stop-btn" class="btn btn-danger" onclick="stopActiveOperation()" style="display: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                Stop
            </button>
            <button id="pause-btn" class="btn btn-amber" onclick="togglePauseOperation()" style="display: none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
                Pause
            </button>
            <button class="btn btn-danger" onclick="killAllPython(this)" title="Kill all background Python processes" style="margin-left: 4px; padding: 6px 10px; font-size: 0.78rem; opacity: 0.8;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg>
                Kill All
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="dashboard-content">
            <div id="upload-lock-banner" class="warning-banner hidden">
                <span style="display: flex; align-items: center; gap: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                    <strong>Upload pending confirmation:</strong>&nbsp;Batch <span id="locked-batch-name" style="font-weight: 700;"></span> was uploaded. Click 'Mark Uploaded' to confirm and unblock new uploads.
                </span>
            </div>

            <div class="controls-bar">
                <div class="tabs-header">
                    <button class="tab-btn active" onclick="switchTab('pending')">Pending Review <span id="badge-pending" class="tab-badge">0</span></button>
                    <button class="tab-btn" onclick="switchTab('uploaded')">Uploaded <span id="badge-uploaded" class="tab-badge">0</span></button>
                    <button class="tab-btn" onclick="switchTab('finalized')">Finalized <span id="badge-finalized" class="tab-badge">0</span></button>
                    <button class="tab-btn" onclick="switchTab('notion-reviews')" id="tab-notion-reviews">Notion Reviews <span id="badge-notion-reviews" class="tab-badge">0</span></button>
                </div>
                <div class="search-wrapper">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" class="search-input" placeholder="Search videos, IDs, categories..." oninput="handleSearch(this.value)">
                </div>
                <button class="btn btn-danger" onclick="deleteAllBatches(this)" title="Delete all batches" style="padding: 6px 12px; font-size: 0.78rem; white-space: nowrap;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete All
                </button>

            <div id="notion-reviews-container" class="batches-list" style="display:none;"></div>

                <div class="log-header-left">

                    <span id="log-badge" class="log-badge"></span>

                    <label><input type="checkbox" id="autoscroll-chk" checked> Auto-scroll</label>
                    <button class="btn btn-secondary" style="padding: 0.15rem 0.5rem; font-size: 0.65rem; border-radius: var(--md-sys-shape-sm);" onclick="clearLogs()">Clear</button>
                </div>

            </div>
