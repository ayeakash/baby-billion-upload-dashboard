    <div id="toast-container" class="toast-container"></div>

    <div id="video-modal" class="video-modal" onclick="if(event.target===this)closeVideoModal()">
        <div class="video-modal-inner">
            <div class="video-modal-header">
                <span id="video-modal-title" class="modal-title">Video Preview</span>
                <button class="modal-close" onclick="closeVideoModal()">&times;</button>
            </div>
            <video id="video-element" playsinline controls></video>
        </div>
    </div>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        let searchQuery = '';
        let currentTab = 'pending';
        let logIndex = 0;
        let activeUploadedBatch = null;
        let isPipelineRunning = false;
        let isPipelinePaused = false;
        let isUploadRunning = false;
        let isUploadPaused = false;

        document.addEventListener('DOMContentLoaded', () => {
            fetchBatches();
            syncBatchSize();
            loadCsvOptions();
            setInterval(fetchBatches, 5000);
            setInterval(fetchLogs, 1500);
            // Ensure console starts collapsed on every page load
            document.getElementById('log-section').classList.remove('expanded');
            document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeVideoModal(); closeDropdown(); } });
        });

        function syncBatchSize() {
            fetch('/api/batch-size').then(r=>r.json()).then(d => {
                const sel = document.getElementById('batch-size-select');
                const val = String(d.batch_size_mb);
                // Set select to current value, or add a custom option if needed
                if (sel.querySelector(`option[value="${val}"]`)) {
                    sel.value = val;
                } else {
                    const opt = document.createElement('option');
                    opt.value = val; opt.textContent = `${val} MB`; opt.selected = true;
                    sel.appendChild(opt);
                }
            }).catch(e => console.error('Failed to sync batch size:', e));
        }

        function setBatchSize(mb) {
            fetch('/api/batch-size', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({batch_size_mb: parseInt(mb)})
            }).then(r=>r.json()).then(d => {
                if (d.error) { alert(d.error); syncBatchSize(); }
                else appendTerminalText(`\n[SYSTEM] ${d.message}\n`);
            }).catch(e => console.error('Failed to set batch size:', e));
        }

        function handleSearch(value) { searchQuery = value; renderCurrentTab(); }

        // ── Inline CSV editing ──────────────────────────────────────
        let csvOptions = null;
        let activeDropdownEl = null;

        // Load options once on page load
        function loadCsvOptions() {
            fetch('/api/csv-options').then(r=>r.json()).then(d => { csvOptions = d; })
                .catch(e => console.error('Failed to load CSV options:', e));
        }

        function getOptionsForField(field, currentAge, currentParent) {
            if (!csvOptions) return [];
            switch(field) {
                case 'age_groups': return csvOptions.age_groups || [];
                case 'categories_name': {
                    // categories_name = Parent Category column
                    const cats = csvOptions.categories_by_age[currentAge] || [];
                    const parents = [...new Set(cats.map(c => c.parent).filter(Boolean))];
                    // Also include standalone categories (no parent) as options
                    const standalone = cats.filter(c => !c.parent).map(c => c.category);
                    return [...parents, ...standalone];
                }
                case 'playlist_name': {
                    // playlist_name = Categories column, filtered by parent if set
                    const cats = csvOptions.categories_by_age[currentAge] || [];
                    if (currentParent) {
                        // Show only categories under this parent
                        return cats.filter(c => c.parent === currentParent).map(c => c.category);
                    }
                    // If no parent set, show all categories
                    return cats.map(c => c.category);
                }
                case 'channel_name': return csvOptions.channel_names || [];
                case 'content_types': return csvOptions.content_types || [];
                case 'content_formats': return csvOptions.content_formats || [];
                case 'tags': return csvOptions.tags || [];
                default: return [];
            }
        }

        function openDropdown(triggerEl, batch, video, field, currentVal) {
            closeDropdown();
            const row = triggerEl.closest('.video-item');
            const dropdownTriggers = row ? row.querySelectorAll('.cell-dropdown-trigger') : [];
            // Column order: [0]=categories_name, [1]=age_groups, [2]=playlist_name, [3]=content_formats, [4]=content_types
            let currentAge = currentVal;
            let currentParent = '';
            if (field !== 'age_groups') {
                currentAge = dropdownTriggers[1] ? dropdownTriggers[1].textContent.trim() : '';
            }
            if (field === 'playlist_name') {
                currentParent = dropdownTriggers[0] ? dropdownTriggers[0].textContent.trim() : '';
            }

            const options = getOptionsForField(field, currentAge, currentParent);
            if (options.length === 0) return;

            triggerEl.classList.add('active');
            activeDropdownEl = triggerEl;

            const panel = document.createElement('div');
            panel.className = 'cell-dropdown-panel';
            panel.id = 'active-cell-dropdown';

            const search = document.createElement('input');
            search.className = 'cell-dropdown-search';
            search.placeholder = 'Search...';
            search.type = 'text';
            panel.appendChild(search);

            const list = document.createElement('div');
            list.className = 'cell-dropdown-list';
            panel.appendChild(list);

            function renderItems(filter) {
                const q = (filter || '').toLowerCase();
                list.innerHTML = '';
                const filtered = options.filter(o => o.toLowerCase().includes(q));
                if (filtered.length === 0) {
                    list.innerHTML = '<div style="padding:6px 8px;font-size:0.65rem;color:var(--md-sys-color-outline)">No matches</div>';
                    return;
                }
                filtered.forEach(opt => {
                    const item = document.createElement('div');
                    item.className = 'cell-dropdown-item' + (opt === currentVal ? ' selected' : '');
                    item.textContent = opt || '(empty)';
                    item.onclick = (e) => {
                        e.stopPropagation();
                        selectDropdownValue(batch, video, field, opt, triggerEl);
                    };
                    list.appendChild(item);
                });
            }
            renderItems('');
            search.oninput = () => renderItems(search.value);

            document.body.appendChild(panel);

            // Position below the trigger
            const rect = triggerEl.getBoundingClientRect();
            panel.style.top = (rect.bottom + 2) + 'px';
            panel.style.left = rect.left + 'px';
            // Keep within viewport
            const pr = panel.getBoundingClientRect();
            if (pr.right > window.innerWidth) panel.style.left = (window.innerWidth - pr.width - 8) + 'px';
            if (pr.bottom > window.innerHeight) panel.style.top = (rect.top - pr.height - 2) + 'px';

            search.focus();

            // Close on outside click
            setTimeout(() => {
                document.addEventListener('click', closeDropdownOutside);
                document.addEventListener('keydown', closeDropdownEsc);
            }, 10);
        }

        function closeDropdown() {
            const panel = document.getElementById('active-cell-dropdown');
            if (panel) panel.remove();
            if (activeDropdownEl) {
                activeDropdownEl.classList.remove('active');
                activeDropdownEl = null;
            }
            document.removeEventListener('click', closeDropdownOutside);
            document.removeEventListener('keydown', closeDropdownEsc);
        }
        function closeDropdownOutside(e) {
            const panel = document.getElementById('active-cell-dropdown');
            if (panel && !panel.contains(e.target) && e.target !== activeDropdownEl) closeDropdown();
        }
        function closeDropdownEsc(e) { if (e.key === 'Escape') closeDropdown(); }

        function selectDropdownValue(batch, video, field, value, triggerEl) {
            closeDropdown();
            const span = triggerEl.querySelector('span');
            const original = span ? span.textContent : '';
            if (value === original) return;

            triggerEl.classList.add('cell-saving');
            fetch(`/api/batches/${batch}/update-csv`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({video_name: video, field: field, value: value})
            }).then(r => r.json()).then(d => {
                triggerEl.classList.remove('cell-saving');
                if (d.error) {
                    triggerEl.style.borderColor = 'var(--md-sys-color-error)';
                    setTimeout(() => triggerEl.style.borderColor = '', 1500);
                    appendTerminalText(`\n[ERROR] ${d.error}\n`);
                } else {
                    if (span) span.textContent = value;
                    triggerEl.title = value;
                    triggerEl.style.borderColor = 'var(--md-custom-color-success)';
                    setTimeout(() => triggerEl.style.borderColor = '', 1000);
                }
            }).catch(e => {
                triggerEl.classList.remove('cell-saving');
                console.error('Save failed:', e);
            });
        }

        function saveTextField(el) {
            const batch = el.dataset.batch;
            const video = el.dataset.video;
            const field = el.dataset.field;
            const original = el.dataset.original || '';
            const newVal = el.textContent.trim();
            if (newVal === original) return;

            el.classList.add('cell-saving');
            fetch(`/api/batches/${batch}/update-csv`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({video_name: video, field: field, value: newVal})
            }).then(r => r.json()).then(d => {
                el.classList.remove('cell-saving');
                if (d.error) {
                    el.textContent = original;
                    el.style.borderColor = 'var(--md-sys-color-error)';
                    setTimeout(() => el.style.borderColor = '', 1500);
                    appendTerminalText(`\n[ERROR] ${d.error}\n`);
                } else {
                    el.dataset.original = newVal;
                    el.title = newVal;
                    el.style.borderColor = 'var(--md-custom-color-success)';
                    setTimeout(() => el.style.borderColor = '', 1000);
                }
            }).catch(e => {
                el.classList.remove('cell-saving');
                el.textContent = original;
                console.error('Save failed:', e);
            });
        }

        function copyToClipboard(text, element, event) {
            if (event) event.stopPropagation();
            navigator.clipboard.writeText(text).then(() => {
                const originalHTML = element.innerHTML;
                element.style.color = 'var(--md-custom-color-success)';
                element.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
                setTimeout(() => { element.style.color = ''; element.innerHTML = originalHTML; }, 1200);
            }).catch(err => console.error('Copy failed:', err));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            currentTab = tabName;
            if (tabName === 'notion-reviews') {
                document.getElementById('batches-container').style.display = 'none';
                document.getElementById('notion-reviews-container').style.display = '';
                fetchNotionReviews();
            } else {
                document.getElementById('batches-container').style.display = '';
                document.getElementById('notion-reviews-container').style.display = 'none';
                renderCurrentTab();
            }
        }

        function fetchNotionReviews() {
            notionReviewsLoading = true;
            renderNotionReviews();
            fetch('/api/pending-reviews').then(r => r.json()).then(data => {
                notionReviewsLoading = false;
                if (data.ok) {
                    notionReviewsGrouped = data.grouped || [];
                    notionReviewsTotal = data.total || 0;
                    // Count actual videos (Hindi + English separately)
                    notionReviewsVideoCount = notionReviewsGrouped.reduce((sum, g) => sum + g.reviews.reduce((s, r) => s + (r.hindi_title ? 1 : 0) + (r.english_title ? 1 : 0) || 1, 0), 0);
                    document.getElementById('badge-notion-reviews').innerText = notionReviewsVideoCount;
                } else {
                    notionReviewsGrouped = [];
                    notionReviewsTotal = 0;
                }
                renderNotionReviews();
            }).catch(() => { notionReviewsLoading = false; renderNotionReviews(); });
        }

        function renderNotionReviews() {
            const container = document.getElementById('notion-reviews-container');
            if (notionReviewsLoading) {
                container.innerHTML = `<div class="empty-state"><span class="spinner" style="width:20px;height:20px;border-width:2px;display:inline-block;margin-bottom:8px"></span><p style="font-size:0.82rem">Loading from Notion…</p></div>`;
                return;
            }
            if (notionReviewsTotal === 0) {
                container.innerHTML = `<div class="empty-state">
                    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <p style="font-size:0.82rem">No pages pending review in Notion.</p>
                </div>`;
                return;
            }

            // Filter by search query
            let filteredGroups = notionReviewsGrouped;
            let filteredTotal = notionReviewsTotal;
            const nrq = notionReviewsSearchQuery.toLowerCase().trim();
            if (nrq) {
                filteredGroups = notionReviewsGrouped.map(g => {
                    const batchMatch = g.batch_name.toLowerCase().includes(nrq);
                    const filtered = g.reviews.filter(r =>
                        (r.video_name && r.video_name.toLowerCase().includes(nrq)) ||
                        (r.hindi_title && r.hindi_title.toLowerCase().includes(nrq)) ||
                        (r.english_title && r.english_title.toLowerCase().includes(nrq)) ||
                        (r.category && r.category.toLowerCase().includes(nrq)) ||
                        (r.age_group && r.age_group.toLowerCase().includes(nrq)) ||
                        (r.batch_id && r.batch_id.toLowerCase().includes(nrq))
                    );
                    if (batchMatch) return g;
                    if (filtered.length > 0) return { ...g, reviews: filtered };
                    return null;
                }).filter(g => g !== null);
                filteredTotal = filteredGroups.reduce((sum, g) => sum + g.reviews.length, 0);
            }
            const filteredVideoCount = filteredGroups.reduce((sum, g) => sum + g.reviews.reduce((s, r) => s + (r.hindi_title ? 1 : 0) + (r.english_title ? 1 : 0) || 1, 0), 0);
            let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;gap:0.5rem">
                <div style="display:flex;align-items:center;gap:0.5rem;flex:1">
                    <div style="position:relative;flex:1;max-width:320px">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--md-sys-color-outline)" stroke-width="2" style="position:absolute;left:8px;top:50%;transform:translateY(-50%)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="notion-reviews-search" placeholder="Filter by batch ID, video, category…" value="${notionReviewsSearchQuery}" oninput="notionReviewsSearchQuery=this.value;renderNotionReviews()" style="width:100%;padding:0.4rem 0.5rem 0.4rem 2rem;border:1px solid var(--md-sys-color-outline-variant);border-radius:var(--md-sys-shape-md);background:var(--md-sys-color-surface-container);color:var(--md-sys-color-on-surface);font-size:0.72rem;font-family:inherit;outline:none;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--md-sys-color-primary)'" onblur="this.style.borderColor='var(--md-sys-color-outline-variant)'" />
                    </div>
                    <span style="font-size:0.72rem;color:var(--md-sys-color-outline);white-space:nowrap">${filteredVideoCount} of ${notionReviewsVideoCount} video(s) across ${filteredGroups.length} batch(es)</span>
                </div>
                <button class="btn btn-success" onclick="finalizeAllReviews()" id="finalize-all-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    Finalize All
                </button>
            </div>`;

            filteredGroups.forEach((group, gIdx) => {
                const bname = group.batch_name;
                const reviews = group.reviews;
                const videoCount = reviews.reduce((sum, r) => sum + (r.hindi_title ? 1 : 0) + (r.english_title ? 1 : 0) || 1, 0);
                const isExp = notionReviewsExpandedBatches.has(bname) || (gIdx === 0 && notionReviewsExpandedBatches.size === 0);
                const cardId = `nr-${bname.replace(/\s/g, '_')}`;

                html += `<div id="${cardId}" class="batch-card ${isExp ? 'expanded' : ''}" style="border-left-color: ${bname === 'Ungrouped' ? 'var(--md-sys-color-outline)' : 'var(--md-sys-color-primary)'}">
                    <div class="batch-summary" onclick="toggleNotionReviewBatch('${cardId}', '${bname}')">
                        <div class="batch-meta-left">
                            <span class="batch-title">${bname === 'Ungrouped' ? 'Ungrouped' : bname.substring(0, 8) + '…'}</span>
                            ${bname !== 'Ungrouped' ? `<span style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;background:rgba(180,197,255,0.1);padding:2px 6px;border-radius:var(--md-sys-shape-sm);color:var(--md-sys-color-primary);cursor:pointer;display:inline-flex;align-items:center;gap:3px" onclick="copyToClipboard('${bname}',this,event)" title="Copy Batch ID: ${bname}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>Copy ID</span>` : ''}
                            <span class="batch-status-badge status-uploaded">${videoCount} video${videoCount !== 1 ? 's' : ''}</span>
                        </div>
                        <div class="batch-meta-right">
                            <button class="btn btn-primary" style="font-size:0.68rem;padding:0.3rem 0.7rem" onclick="event.stopPropagation();finalizeBatchReviews('${bname}')" title="Finalize all ${reviews.length} videos in this batch">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                Finalize Batch
                            </button>
                            <svg class="expand-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                    <div class="batch-details"><div class="batch-details-inner">
                        <div style="display:grid;grid-template-columns:2.5fr 0.6fr 2.5fr 1fr 1fr 0.8fr;padding:0.25rem 0.5rem;color:var(--md-sys-color-outline);font-size:0.58rem;font-weight:500;letter-spacing:0.04em;border-bottom:1px solid var(--md-sys-color-outline-variant)">
                            <span>VIDEO NAME</span><span>LANG</span><span>TITLE ON APP</span><span>AGE GROUP</span><span>CATEGORY</span><span></span>
                        </div>`;

                reviews.forEach(r => {
                    const variants = [];
                    if (r.hindi_title) variants.push({ lang: 'Hi', title: r.hindi_title, color: '#F59E0B' });
                    if (r.english_title) variants.push({ lang: 'En', title: r.english_title, color: '#60A5FA' });
                    if (variants.length === 0) variants.push({ lang: '—', title: '—', color: 'var(--md-sys-color-outline)' });

                    variants.forEach((v, vi) => {
                        html += `<div class="video-item" style="grid-template-columns:2.5fr 0.6fr 2.5fr 1fr 1fr 0.8fr${vi > 0 ? ';border-top:1px dashed var(--md-sys-color-outline-variant)' : ''}">
                            <div class="video-name-cell" title="${r.page_id}">
                                ${vi === 0 ? `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.video_name || '—'}</span>` : `<span style="opacity:0.3;font-size:0.6rem">↳ same page</span>`}
                            </div>
                            <div class="video-meta-cell"><span style="font-size:0.6rem;font-weight:600;padding:1px 6px;border-radius:4px;background:${v.color}22;color:${v.color};letter-spacing:0.02em">${v.lang}</span></div>
                            <div class="video-meta-cell" style="color:var(--md-custom-color-success)">${v.title}</div>
                            <div class="video-meta-cell">${vi === 0 ? (r.age_group || '—') : ''}</div>
                            <div class="video-meta-cell">${vi === 0 ? (r.category || '—') : ''}</div>
                            <div>${vi === 0 ? `<button class="btn btn-primary" style="font-size:0.65rem;padding:0.3rem 0.6rem" onclick="finalizeOneReview('${r.page_id}', this)">Finalize</button>` : ''}</div>
                        </div>`;
                    });
                });

                html += `</div></div></div>`;
            });

            container.innerHTML = html;
        }

        let notionReviewsExpandedBatches = new Set();

        function toggleNotionReviewBatch(cardId, bname) {
            const c = document.getElementById(cardId);
            if (c) {
                c.classList.toggle('expanded');
                if (c.classList.contains('expanded')) {
                    notionReviewsExpandedBatches.add(bname);
                } else {
                    notionReviewsExpandedBatches.delete(bname);
                }
            }
        }

        function finalizeOneReview(pageId, btn) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            fetch(`/api/pending-reviews/${pageId}/finalize`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.ok) {
                        // Remove from grouped data
                        notionReviewsGrouped.forEach(g => {
                            g.reviews = g.reviews.filter(r => r.page_id !== pageId);
                        });
                        notionReviewsGrouped = notionReviewsGrouped.filter(g => g.reviews.length > 0);
                        notionReviewsTotal = notionReviewsGrouped.reduce((sum, g) => sum + g.reviews.length, 0);
                        document.getElementById('badge-notion-reviews').innerText = notionReviewsTotal;
                        renderNotionReviews();
                        showToast('success', 'Finalized', `Page finalized in Notion`, 3000);
                    } else {
                        btn.disabled = false;
                        btn.innerHTML = 'Retry';
                        showToast('error', 'Failed', data.message, 4000);
                    }
                }).catch(() => { btn.disabled = false; btn.innerHTML = 'Retry'; });
        }

        function finalizeBatchReviews(batchName) {
            const group = notionReviewsGrouped.find(g => g.batch_name === batchName);
            if (!group || group.reviews.length === 0) return;

            if (!confirm(`Finalize all ${group.reviews.length} videos in ${batchName}?\n\nThis will set Upload=Yes and Upload Date=today in Notion.`)) return;

            const pageIds = group.reviews.map(r => r.page_id);
            const tid = showToast('progress', `Finalizing ${batchName}`, `Processing ${pageIds.length} pages…`);

            fetch('/api/pending-reviews/finalize-batch', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({page_ids: pageIds})
            }).then(r => r.json()).then(data => {
                if (data.ok) {
                    updateToast(tid, 'success', 'Batch Finalized', data.message);
                    fetchNotionReviews();
                } else {
                    updateToast(tid, 'error', 'Failed', data.message);
                }
            }).catch(() => { updateToast(tid, 'error', 'Failed', 'Request failed'); });
        }

        function finalizeAllReviews() {
            const total = notionReviewsTotal;
            if (!confirm(`Finalize ALL ${total} pages across all batches?\n\nThis will set Upload=Yes and Upload Date=today in Notion.`)) return;

            const btn = document.getElementById('finalize-all-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Finalizing…';
            const tid = showToast('progress', 'Finalizing All', `Processing ${total} pages…`);
            fetch('/api/pending-reviews/finalize-all', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Finalize All`;
                    if (data.ok) {
                        updateToast(tid, 'success', 'All Finalized', data.message);
                        fetchNotionReviews();
                    } else {
                        updateToast(tid, 'error', 'Error', data.message);
                    }
                }).catch(() => { btn.disabled = false; btn.innerHTML = 'Retry'; updateToast(tid, 'error', 'Failed', 'Request failed'); });
        }

        let cacheData = { pending: [], uploaded: [], finalized: [] };
        let notionReviewsGrouped = [];
        let notionReviewsTotal = 0;
        let notionReviewsVideoCount = 0;
        let notionReviewsLoading = false;
        let notionReviewsSearchQuery = '';

        function fetchBatches() {
            fetch('/api/batches').then(res => res.json()).then(data => {
                cacheData = data;
                activeUploadedBatch = data.active_uploaded_batch;
                isPipelineRunning = data.pipeline_running;
                isPipelinePaused = data.pipeline_paused;
                isUploadRunning = data.upload_running;
                isUploadPaused = data.upload_paused;
                const uploadBatchName = data.upload_batch_name;
                updateOperationToasts();

                document.getElementById('badge-pending').innerText = data.pending.length;
                document.getElementById('badge-uploaded').innerText = data.uploaded.length;
                document.getElementById('badge-finalized').innerText = data.finalized.length;

                const si = document.getElementById('pipeline-status-indicator');
                const st = document.getElementById('pipeline-status-text');
                if (isPipelineRunning) {
                    si.className = isPipelinePaused ? 'status-pill paused' : 'status-pill batching';
                    st.innerText = isPipelinePaused ? 'Batcher Paused' : 'Batching...';
                } else if (isUploadRunning) {
                    si.className = isUploadPaused ? 'status-pill paused' : 'status-pill uploading';
                    st.innerText = isUploadPaused ? `Paused — ${uploadBatchName}` : `Uploading ${uploadBatchName}`;
                } else {
                    si.className = 'status-pill idle';
                    st.innerText = 'System Idle';
                }

                const runBtn = document.getElementById('run-pipeline-btn');
                const stopBtn = document.getElementById('stop-btn');
                const pauseBtn = document.getElementById('pause-btn');

                if (isPipelineRunning) {
                    runBtn.disabled = true;
                    runBtn.innerHTML = `<span class="spinner"></span> Batching...`;
                    stopBtn.style.display = 'inline-flex';
                    stopBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg> Stop`;
                    pauseBtn.style.display = 'inline-flex';
                    pauseBtn.innerHTML = isPipelinePaused
                        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume`
                        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg> Pause`;
                } else if (isUploadRunning) {
                    runBtn.disabled = true;
                    runBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg> Fetch & Batch`;
                    stopBtn.style.display = 'inline-flex';
                    stopBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg> Stop`;
                    pauseBtn.style.display = 'inline-flex';
                    pauseBtn.innerHTML = isUploadPaused
                        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg> Resume`
                        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg> Pause`;
                } else {
                    runBtn.disabled = false;
                    runBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg> Fetch & Batch`;
                    stopBtn.style.display = 'none';
                    pauseBtn.style.display = 'none';
                }

                const lockBanner = document.getElementById('upload-lock-banner');
                if (activeUploadedBatch) {
                    lockBanner.classList.remove('hidden');
                    document.getElementById('locked-batch-name').innerText = activeUploadedBatch;
                } else { lockBanner.classList.add('hidden'); }

                renderCurrentTab();
            }).catch(err => console.error("Error fetching batches:", err));
        }

        function isUserEditing() {
            // Check if user has focus on a contenteditable cell or a dropdown is open
            if (document.getElementById('active-cell-dropdown')) return true;
            const active = document.activeElement;
            if (active && (active.classList.contains('text-edit') || active.classList.contains('cell-dropdown-search'))) return true;
            return false;
        }

        function renderCurrentTab() {
            if (isUserEditing()) return; // Don't wipe DOM during active edits
            const container = document.getElementById('batches-container');
            let batches = cacheData[currentTab] || [];

            if (searchQuery.trim() !== '') {
                const q = searchQuery.toLowerCase().trim();
                batches = batches.map(b => {
                    const fv = b.videos ? b.videos.filter(v =>
                        (v.video_name && v.video_name.toLowerCase().includes(q)) ||
                        (v.page_id && v.page_id.toLowerCase().includes(q)) ||
                        (v.category && v.category.toLowerCase().includes(q)) ||
                        (v.age_group && v.age_group.toLowerCase().includes(q))
                    ) : [];
                    const nm = b.batch_name.toLowerCase().includes(q);
                    if (nm || fv.length > 0) return { ...b, videos: nm ? b.videos : fv };
                    return null;
                }).filter(b => b !== null);
            }

            if (batches.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
                    <p style="font-size:0.82rem">${searchQuery.trim() !== '' ? 'No results match your search.' : 'No batches in this category.'}</p>
                </div>`;
                return;
            }

            const expanded = Array.from(document.querySelectorAll('.batch-card.expanded')).map(c => c.id);
            let html = '';
            batches.forEach((b, idx) => {
                const isExp = expanded.includes(b.batch_name) || (currentTab === 'pending' && idx === 0 && expanded.length === 0) || (searchQuery.trim() !== '');
                let sc = 'status-review', sl = 'Pending', jb = '';
                if (b.status === 'pending_second_review') {
                    sc = 'status-uploaded'; sl = 'Uploaded';
                    if (b.upload_job_id) jb = `<span style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;background:rgba(180,197,255,0.1);padding:2px 6px;border-radius:var(--md-sys-shape-sm);color:var(--md-sys-color-primary);cursor:pointer;display:inline-flex;align-items:center;gap:3px" onclick="copyToClipboard('${b.upload_job_id}',this,event)" title="Copy CMS ID: ${b.upload_job_id}"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>${b.upload_job_id.substring(0,8)}…</span>`;
                } else if (b.status === 'finalized') { sc = 'status-finalized'; sl = 'Finalized'; }
                const ds = b.created_at ? new Date(b.created_at).toLocaleString() : '';
                const cnt = b.videos ? b.videos.length : 0;

                html += `<div id="${b.batch_name}" class="batch-card ${isExp?'expanded':''}" data-status="${b.status}">
                    <div class="batch-summary" onclick="toggleBatchCard('${b.batch_name}')">
                        <div class="batch-meta-left">
                            <span class="batch-title">${b.batch_name}</span>
                            <span class="batch-status-badge ${sc}">${sl}</span>
                            ${jb}
                        </div>
                        <div class="batch-meta-right">
                            <div class="batch-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg><span>${cnt}</span></div>
                            <div class="batch-meta-item"><span>${b.zip_size_mb} MB</span></div>
                            ${ds?`<span style="font-size:0.7rem;opacity:0.5">${ds}</span>`:''}
                            <svg class="expand-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                    <div class="batch-details"><div class="batch-details-inner">
                        ${renderActionPanel(b)}
                        <div class="video-grid-header"><div>video_name</div><div>categories_name</div><div>age_groups</div><div>channel_name</div><div>tags</div><div>playlist_name</div><div>content_formats</div><div>content_types</div><div style="text-align:right;padding-right:0.4rem">Status</div></div>
                        <div class="video-grid-rows">${b.videos.map(v => {
                            const esc = (s) => (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
                            return `
                            <div class="video-item${v.pipeline_status === 'bad' ? ' bad' : ''}" ${v.pipeline_status === 'bad' && v.redo_reason ? `title="Re-do reason: ${(v.redo_reason||'').replace(/"/g,'&quot;')}"` : ''}>
                                <div class="video-name-cell">
                                    ${b.local_folder_exists ? `<button class="play-icon-btn" onclick="playVideo('${b.batch_name}','${v.video_name}.mp4')" title="Preview"><svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>` : `<div style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;opacity:0.2"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/></svg></div>`}
                                    <div style="display:flex;flex-direction:column;gap:1px;min-width:0">
                                        <div class="video-meta-cell text-edit" contenteditable="true" data-batch="${b.batch_name}" data-video="${v.video_name}" data-field="video_name" data-original="${esc(v.video_name)}" onblur="saveTextField(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}" onfocus="this.dataset.original=this.textContent.trim()" style="font-weight:500" title="${esc(v.video_name)}">${esc(v.video_name)}</div>
                                        <span style="font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--md-sys-color-outline);cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding:1px 3px;border-radius:3px;background:rgba(255,255,255,0.03)" onclick="copyToClipboard('${v.page_id}',this,event)" title="Copy Page ID">${v.page_id}</span>
                                    </div>
                                </div>
                                <div class="video-meta-cell cell-dropdown-trigger" onclick="openDropdown(this,'${b.batch_name}','${esc(v.video_name)}','categories_name','${esc(v.categories_name)}')" title="${esc(v.categories_name)}"><span>${v.categories_name||''}</span></div>
                                <div class="video-meta-cell cell-dropdown-trigger" onclick="openDropdown(this,'${b.batch_name}','${esc(v.video_name)}','age_groups','${esc(v.age_group)}')"><span>${v.age_group||''}</span></div>
                                <div class="video-meta-cell text-edit" contenteditable="true" data-batch="${b.batch_name}" data-video="${v.video_name}" data-field="channel_name" data-original="${esc(v.channel_name)}" onblur="saveTextField(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}" onfocus="this.dataset.original=this.textContent.trim()" title="${esc(v.channel_name)}">${v.channel_name||''}</div>
                                <div class="video-meta-cell text-edit" contenteditable="true" data-batch="${b.batch_name}" data-video="${v.video_name}" data-field="tags" data-original="${esc(v.tags)}" onblur="saveTextField(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}" onfocus="this.dataset.original=this.textContent.trim()" title="${esc(v.tags)}">${v.tags||''}</div>
                                <div class="video-meta-cell cell-dropdown-trigger" onclick="openDropdown(this,'${b.batch_name}','${esc(v.video_name)}','playlist_name','${esc(v.playlist_name||v.category)}')" title="${esc(v.playlist_name||v.category)}"><span>${v.playlist_name||v.category||''}</span></div>
                                <div class="video-meta-cell cell-dropdown-trigger" onclick="openDropdown(this,'${b.batch_name}','${esc(v.video_name)}','content_formats','${esc(v.content_formats)}')" style="font-size:0.62rem"><span>${v.content_formats||''}</span></div>
                                <div class="video-meta-cell cell-dropdown-trigger" onclick="openDropdown(this,'${b.batch_name}','${esc(v.video_name)}','content_types','${esc(v.content_types)}')" style="font-size:0.62rem"><span>${v.content_types||''}</span></div>
                                <div class="video-meta-cell" style="text-align:right;padding-right:0.4rem;text-transform:capitalize;font-weight:500;font-size:0.62rem;display:flex;align-items:center;justify-content:flex-end;gap:2px">${v.pipeline_status === 'bad'
                                    ? `<span style="color:var(--md-sys-color-error)">Bad</span><button class="mark-bad-btn" onclick="event.stopPropagation();toggleBadVideo('${b.batch_name}','${v.page_id}',false)" title="Restore — undo bad mark">↺</button>`
                                    : `<span style="color:${v.pipeline_status==='uploaded'?'var(--md-custom-color-success)':'var(--md-sys-color-outline)'}">${v.pipeline_status.replace(/_/g,' ')}</span>${b.status !== 'finalized' ? `<button class="mark-bad-btn" onclick="event.stopPropagation();toggleBadVideo('${b.batch_name}','${v.page_id}',true)" title="Mark as bad — will be skipped during finalization">✕</button>` : ''}`
                                }</div>
                            </div>`}).join('')}
                        </div>
                    </div></div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function toggleBatchCard(n) { const c = document.getElementById(n); if (c) c.classList.toggle('expanded'); }

        function toggleBadVideo(batchName, pageId, bad) {
            let reason = '';
            if (bad) {
                reason = prompt('Reason for re-do (will be saved to Notion):');
                if (reason === null) return; // user cancelled
            }
            fetch(`/api/batches/${batchName}/mark-bad`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({page_id: pageId, bad: bad, reason: reason})
            }).then(r => r.json()).then(d => {
                if (d.error) appendTerminalText(`\n[ERROR] ${d.error}\n`);
                else { appendTerminalText(`\n[SYSTEM] ${d.message}\n`); fetchBatches(); }
            }).catch(e => { console.error('Toggle bad failed:', e); appendTerminalText(`\n[ERROR] Failed to toggle bad status.\n`); });
        }

        function renderActionPanel(batch) {
            const ur = cacheData.upload_running;
            const ul = (activeUploadedBatch !== null && activeUploadedBatch !== batch.batch_name) || ur;
            const sb = isPipelineRunning || ur;

            if (batch.status === 'pending_first_review') {
                return `<div class="batch-action-panel">
                    <div class="panel-info"><span class="panel-info-title">Stage 1 — Local Review</span><span class="panel-info-value">Review files, then upload or mark as uploaded.</span></div>
                    <div class="panel-actions">
                        ${batch.local_folder_exists ? `<button class="btn btn-secondary" onclick="openBatchFolder('${batch.batch_name}')" ${sb?'disabled':''}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> Open</button>` : ''}
                        <button class="btn btn-primary" onclick="triggerAutomatedUpload('${batch.batch_name}')" ${ul||isPipelineRunning?'disabled':''}>Auto Upload</button>
                        <button class="btn btn-success" onclick="markUploadedManually('${batch.batch_name}')">Mark Uploaded</button>
                        <button class="btn btn-secondary" onclick="regenerateCsv('${batch.batch_name}')" ${sb?'disabled':''} style="margin-left:auto"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Regen CSV</button>
                        <button class="btn btn-danger" onclick="deleteBatch('${batch.batch_name}', this)" ${sb?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete</button>
                    </div></div>`;
            } else if (batch.status === 'pending_second_review') {
                return `<div class="batch-action-panel">
                    <div class="panel-info"><span class="panel-info-title" style="color:var(--md-sys-color-primary)">Stage 2 — Awaiting Approval</span><span class="panel-info-value">Job ID: ${batch.upload_job_id||'Manual'}. Review in CMS, then finalize.</span></div>
                    <div class="panel-actions">
                        ${batch.local_folder_exists ? `<button class="btn btn-secondary" onclick="openBatchFolder('${batch.batch_name}')" ${sb?'disabled':''}>Open</button>` : ''}
                        <button class="btn btn-danger" onclick="finalizeBatchReal('${batch.batch_name}')" ${sb?'disabled':''}>Finalize &amp; Sync</button>
                        <button class="btn btn-secondary" onclick="regenerateCsv('${batch.batch_name}')" ${sb?'disabled':''} style="margin-left:auto"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg> Regen CSV</button>
                        <button class="btn btn-danger" onclick="deleteBatch('${batch.batch_name}', this)" ${sb?'disabled':''}><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete</button>
                    </div></div>`;
            } else {
                return `<div class="batch-action-panel">
                    <div class="panel-info"><span class="panel-info-title" style="color:var(--md-custom-color-success)">Archive</span><span class="panel-info-value">Finalized ${batch.finalized_date?new Date(batch.finalized_date).toLocaleString():''}. Notion synced.</span></div></div>`;
            }
        }

        // ── Button actions ──────────────────────────────────────────
        function regenerateCsv(batchName) {
            if (!confirm(`Regenerate CSV for ${batchName}? This will overwrite all current edits with fresh category mappings.`)) return;
            appendTerminalText(`\n[SYSTEM] Regenerating CSV for ${batchName}...\n`);
            fetch(`/api/batches/${batchName}/regenerate-csv`, {method:'POST'})
                .then(r => r.json()).then(d => {
                    appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                    fetchBatches();
                }).catch(e => appendTerminalText(`[ERROR] Request failed.\n`));
        }

        function deleteBatch(batchName, btn) {
            if (!btn) return;
            // First click: ask for confirmation inline
            if (!btn.dataset.confirmDelete) {
                btn.dataset.confirmDelete = 'true';
                const origHTML = btn.innerHTML;
                btn.innerHTML = '⚠️ Click again to confirm';
                btn.style.background = 'var(--md-sys-color-error-container)';
                btn.style.color = 'var(--md-sys-color-error)';
                setTimeout(() => {
                    delete btn.dataset.confirmDelete;
                    btn.innerHTML = origHTML;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 3000);
                return;
            }
            // Second click: actually delete
            delete btn.dataset.confirmDelete;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Deleting...';
            appendTerminalText(`\n[SYSTEM] Deleting batch ${batchName}...\n`);
            fetch(`/api/batches/${batchName}/delete`, {method:'POST'})
                .then(r => r.json()).then(d => {
                    appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                    fetchBatches();
                }).catch(e => { appendTerminalText(`[ERROR] Request failed.\n`); fetchBatches(); });
        }

        function killAllPython(btn) {
            if (!btn) return;
            if (!btn.dataset.confirmKill) {
                btn.dataset.confirmKill = 'true';
                const orig = btn.innerHTML;
                btn.innerHTML = '⚠️ Confirm Kill';
                btn.style.opacity = '1';
                setTimeout(() => { delete btn.dataset.confirmKill; btn.innerHTML = orig; btn.style.opacity = '0.8'; }, 3000);
                return;
            }
            delete btn.dataset.confirmKill;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Killing...';
            appendTerminalText('\n[SYSTEM] Killing all Python processes...\n');
            fetch('/api/kill-all-python', {method:'POST'})
                .then(r => r.json()).then(d => {
                    appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                    btn.disabled = false;
                    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg> Kill All';
                    btn.style.opacity = '0.8';
                    fetchBatches();
                }).catch(e => { appendTerminalText(`[ERROR] ${e}\n`); btn.disabled = false; });
        }

        function deleteAllBatches(btn) {
            if (!btn) return;
            if (!btn.dataset.confirmDeleteAll) {
                btn.dataset.confirmDeleteAll = 'true';
                const orig = btn.innerHTML;
                btn.innerHTML = '⚠️ Confirm Delete All';
                btn.style.opacity = '1';
                setTimeout(() => { delete btn.dataset.confirmDeleteAll; btn.innerHTML = orig; btn.style.opacity = ''; }, 3000);
                return;
            }
            delete btn.dataset.confirmDeleteAll;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Deleting...';
            fetch('/api/batches/delete-all', {method:'POST'})
                .then(r => r.json()).then(d => {
                    appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                    btn.disabled = false;
                    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Delete All';
                    fetchBatches();
                }).catch(e => { appendTerminalText(`[ERROR] ${e}\n`); btn.disabled = false; });
        }

        function stopActiveOperation() {
            const b = document.getElementById('stop-btn'); if (b.disabled) return;
            b.disabled = true; b.innerHTML = `<span class="spinner"></span> Stopping...`;
            const tid = showToast('progress', 'Stopping Everything', 'Killing all processes…');
            appendTerminalText(`\n[SYSTEM] Stopping everything...\n`);
            fetch('/api/stop-everything', {method:'POST'}).then(r=>r.json()).then(d => {
                appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                if (d.error) updateToast(tid, 'error', 'Stop Failed', d.error);
                else updateToast(tid, 'success', 'Stopped', d.message);
                b.disabled = false; isUploadRunning = false; isPipelineRunning = false; fetchBatches();
            }).catch(e => { appendTerminalText(`[ERROR] Stop request failed.\n`); updateToast(tid, 'error', 'Stop Failed', 'Request failed'); b.disabled = false; fetchBatches(); });
        }

        function togglePauseOperation() {
            const b = document.getElementById('pause-btn'); if (b.disabled) return;
            if (!isPipelineRunning && !isUploadRunning) { fetchBatches(); return; }
            b.disabled = true;
            let ep, at;
            if (isPipelineRunning) { ep = isPipelinePaused?'/api/batches/resume-pipeline':'/api/batches/pause-pipeline'; at = isPipelinePaused?'resuming':'pausing'; }
            else if (isUploadRunning) { ep = isUploadPaused?'/api/batches/resume-upload':'/api/batches/pause-upload'; at = isUploadPaused?'resuming':'pausing'; }
            else { b.disabled = false; fetchBatches(); return; }
            appendTerminalText(`\n[SYSTEM] Requesting ${at}...\n`);
            const capAt = at.charAt(0).toUpperCase() + at.slice(1);
            showToast('info', capAt, `Operation ${at}…`, 2500);
            fetch(ep, {method:'POST'}).then(r=>r.json()).then(d => {
                appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[SUCCESS] ${d.message}\n`);
                b.disabled = false; fetchBatches();
            }).catch(e => { appendTerminalText(`[ERROR] Request failed.\n`); b.disabled = false; fetchBatches(); });
        }

        function runPipelineBatching() {
            if (isPipelineRunning) return;
            const bo = document.getElementById('batch-only-chk').checked;
            const maxBatches = parseInt(document.getElementById('max-batches-input').value) || 10;
            appendTerminalText(`\n[SYSTEM] Starting pipeline (${bo?'batch-only':'full'}, max ${maxBatches} batches)...\n`);
            isPipelineRunning = true;
            pipelineToastId = showToast('progress', 'Pipeline Running', bo ? 'Batching existing downloads…' : 'Fetching from Notion & batching…');
            const rb = document.getElementById('run-pipeline-btn'); rb.disabled = true; rb.innerHTML = `<span class="spinner"></span> Starting...`;
            const si = document.getElementById('pipeline-status-indicator'); si.className = 'status-pill batching';
            document.getElementById('pipeline-status-text').innerText = 'Starting...';
            renderCurrentTab();
            fetch('/api/batches/run-pipeline', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({batch_only:bo, max_batches:maxBatches})})
                .then(r=>r.json()).then(d => {
                    if (d.error) { appendTerminalText(`[ERROR] ${d.error}\n`); updateToast(pipelineToastId, 'error', 'Pipeline Failed', d.error); isPipelineRunning = false; fetchBatches(); }
                    else appendTerminalText(`[INFO] ${d.message}\n`);
                }).catch(e => { appendTerminalText(`[ERROR] Failed to start.\n`); updateToast(pipelineToastId, 'error', 'Pipeline Failed', 'Failed to start'); isPipelineRunning = false; fetchBatches(); });
        }

        function openBatchFolder(n) { fetch(`/api/batches/${n}/open-folder`,{method:'POST'}).then(r=>r.json()).then(d=>{if(d.error)alert(d.error)}); }

        function triggerAutomatedUpload(n) {
            appendTerminalText(`\n[SYSTEM] Starting upload for ${n}...\n`);
            // Update all state immediately so buttons work
            cacheData.upload_running = true; cacheData.upload_batch_name = n;
            isUploadRunning = true; isUploadPaused = false;
            uploadToastId = showToast('progress', `Uploading ${n}`, 'Selenium browser launching…');
            const si = document.getElementById('pipeline-status-indicator'); si.className = 'status-pill uploading';
            document.getElementById('pipeline-status-text').innerText = `Uploading ${n}...`;
            // Show Stop/Pause buttons immediately
            const stopBtn = document.getElementById('stop-btn');
            const pauseBtn = document.getElementById('pause-btn');
            stopBtn.style.display = 'inline-flex';
            stopBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg> Stop`;
            pauseBtn.style.display = 'inline-flex';
            pauseBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg> Pause`;
            document.getElementById('run-pipeline-btn').disabled = true;
            renderCurrentTab();
            fetch(`/api/batches/${n}/upload`,{method:'POST'}).then(r=>r.json()).then(d => {
                if (d.error) { appendTerminalText(`[ERROR] ${d.error}\n`); updateToast(uploadToastId, 'error', 'Upload Failed', d.error); cacheData.upload_running = false; isUploadRunning = false; fetchBatches(); }
                else appendTerminalText(`[INFO] ${d.message}\n`);
            }).catch(e => { appendTerminalText(`[ERROR] Upload request failed.\n`); updateToast(uploadToastId, 'error', 'Upload Failed', 'Request failed'); });
        }

        function markUploadedManually(n) {
            // No blocking for Mark Uploaded — second reviews can happen in bulk
            // Check if batch already has a job ID from auto-upload
            const batch = [...(cacheData.pending||[]), ...(cacheData.uploaded||[])].find(b => b.batch_name === n);
            let jid = '';
            if (batch && batch.upload_completed && batch.upload_job_id) {
                // Auto-upload already captured the job ID, no need to prompt
                jid = batch.upload_job_id;
            } else {
                jid = prompt(`Enter Job ID (UUID) or leave blank for "MANUAL":`);
                if (jid === null) return;
            }
            fetch(`/api/batches/${n}/mark-uploaded`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:jid})})
                .then(r=>r.json()).then(d => {
                    if (d.error) alert(d.error);
                    else { appendTerminalText(`\n[SYSTEM] ${n} marked uploaded.\n`); fetchBatches(); }
                }).catch(e => console.error(e));
        }

        function finalizeBatchReal(n) {
            if (!confirm(`Finalize ${n}?\n\nThis will update Notion and delete local files. Irreversible.`)) return;
            appendTerminalText(`\n[SYSTEM] Finalizing ${n}...\n`);
            const tid = showToast('progress', `Finalizing ${n}`, 'Syncing to Notion & cleaning up…');
            fetch(`/api/batches/${n}/finalize`,{method:'POST'}).then(r=>r.json()).then(d => {
                appendTerminalText(d.error ? `[ERROR] ${d.error}\n` : `[INFO] ${d.message}\n`);
                if (d.error) updateToast(tid, 'error', 'Finalization Failed', d.error);
                else { updateToast(tid, 'success', 'Finalized', d.message); fetchBatches(); }
            }).catch(e => { appendTerminalText(`[ERROR] Finalization failed.\n`); updateToast(tid, 'error', 'Finalization Failed', 'Request failed'); });
        }

        // ── Video player (Plyr) ─────────────────────────────────────
        let plyrInstance = null;
        function playVideo(bn, fn) {
            document.getElementById('video-modal-title').innerText = `${fn} — ${bn}`;
            const v = document.getElementById('video-element');
            v.src = `/videos/${bn}/${fn}`;
            if (!plyrInstance) {
                plyrInstance = new Plyr(v, {
                    controls: ['play-large','play','progress','current-time','duration','mute','volume','fullscreen'],
                    resetOnEnd: true,
                });
            }
            document.getElementById('video-modal').classList.add('active');
            v.play();
        }
        function closeVideoModal() {
            if (plyrInstance) { plyrInstance.pause(); }
            const v = document.getElementById('video-element');
            v.pause(); v.removeAttribute('src'); v.load();
            document.getElementById('video-modal').classList.remove('active');
        }

        // ── Console drawer ────────────────────────────────────────
        let lastLogLine = '';
        let pipelineToastId = null;
        let uploadToastId = null;
        let _toastIdCounter = 0;

        function toggleConsole() {
            const wrap = document.getElementById('log-terminal-wrap');
            const section = document.getElementById('log-section');
            if (wrap.style.display === 'none' || wrap.style.display === '') {
                wrap.style.display = 'block';
                section.classList.add('expanded');
            } else {
                wrap.style.display = 'none';
                section.classList.remove('expanded');
            }
        }

        function updateLogBadge(text) {
            const badge = document.getElementById('log-badge');
            const clean = text.replace(/\n/g, '').trim();
            if (clean) { badge.textContent = clean; lastLogLine = clean; }
        }

        // ── Toast notification system ─────────────────────────────
        function showToast(type, title, msg, autoDismissMs) {
            const id = 'toast-' + (++_toastIdCounter);
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.id = id;
            const iconSvg = type === 'success'
                ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-custom-color-success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
                : type === 'error'
                ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-sys-color-error)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
                : `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`;
            const progressHtml = type === 'progress'
                ? `<div class="toast-progress"><div class="toast-progress-bar" id="${id}-bar"></div></div>` : '';
            toast.innerHTML = `${iconSvg}<div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div>${progressHtml}</div>`;
            container.appendChild(toast);
            // Auto-dismiss for non-progress toasts
            const dismissTime = autoDismissMs || (type === 'progress' ? 0 : 4000);
            if (dismissTime > 0) {
                setTimeout(() => dismissToast(id), dismissTime);
            }
            return id;
        }

        function updateToast(id, type, title, msg) {
            const toast = document.getElementById(id);
            if (!toast) return;
            toast.className = `toast ${type}`;
            const bar = document.getElementById(`${id}-bar`);
            const iconSvg = type === 'success'
                ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-custom-color-success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
                : type === 'error'
                ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-sys-color-error)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
                : `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>`;
            const progressHtml = type === 'progress'
                ? `<div class="toast-progress"><div class="toast-progress-bar" id="${id}-bar"></div></div>`
                : (type === 'success' ? `<div class="toast-progress"><div class="toast-progress-bar success"></div></div>` :
                   type === 'error' ? `<div class="toast-progress"><div class="toast-progress-bar error"></div></div>` : '');
            toast.innerHTML = `${iconSvg}<div class="toast-body"><div class="toast-title">${title}</div><div class="toast-msg">${msg}</div>${progressHtml}</div>`;
            // Auto-dismiss success/error after 4s
            if (type !== 'progress') {
                setTimeout(() => dismissToast(id), 4000);
            }
        }

        function dismissToast(id) {
            const toast = document.getElementById(id);
            if (!toast) return;
            toast.classList.add('toast-out');
            setTimeout(() => toast.remove(), 300);
        }

        // Update progress toasts based on live status changes
        function updateOperationToasts() {
            // Pipeline finished
            if (pipelineToastId && !isPipelineRunning) {
                updateToast(pipelineToastId, 'success', 'Pipeline Complete', 'Batching finished successfully');
                pipelineToastId = null;
            }
            // Upload finished
            if (uploadToastId && !isUploadRunning) {
                updateToast(uploadToastId, 'success', 'Upload Complete', 'Click "Mark Uploaded" to confirm');
                uploadToastId = null;
            }
        }

        function fetchLogs() {
            fetch(`/api/logs?index=${logIndex}`).then(r=>r.json()).then(d => {
                if (d.lines && d.lines.length > 0) {
                    const t = document.getElementById('terminal');
                    d.lines.forEach(l => {
                        const s = document.createElement('span');
                        if (l.includes('[ERROR]')||l.includes('ERROR')) s.style.color = 'var(--md-sys-color-error)';
                        else if (l.includes('[SUCCESS]')) s.style.color = 'var(--md-custom-color-success)';
                        else if (l.includes('[INFO]')) s.style.color = 'var(--md-sys-color-primary)';
                        else if (l.includes('[SYSTEM]')) s.style.color = 'var(--md-sys-color-tertiary)';
                        else if (l.includes('[WARNING]')||l.includes('WARNING')) s.style.color = 'var(--md-custom-color-warning)';
                        s.textContent = l + '\n'; t.appendChild(s);
                    });
                    logIndex = d.next_index;
                    updateLogBadge(d.lines[d.lines.length - 1]);
                    if (document.getElementById('autoscroll-chk').checked) t.scrollTop = t.scrollHeight;
                    // Update upload toast with latest log line
                    if (uploadToastId && isUploadRunning) {
                        const lastLine = d.lines[d.lines.length - 1].replace(/^.*?\s{2,}/, '').trim();
                        if (lastLine) {
                            const bar = document.getElementById(`${uploadToastId}-bar`);
                            const msgEl = document.querySelector(`#${uploadToastId} .toast-msg`);
                            if (msgEl) msgEl.textContent = lastLine;
                        }
                    }
                    // Update pipeline toast with latest log line
                    if (pipelineToastId && isPipelineRunning) {
                        const lastLine = d.lines[d.lines.length - 1].replace(/^.*?\s{2,}/, '').trim();
                        if (lastLine) {
                            const msgEl = document.querySelector(`#${pipelineToastId} .toast-msg`);
                            if (msgEl) msgEl.textContent = lastLine;
                        }
                    }
                }
            }).catch(e => console.error("Log fetch error:", e));
        }

        function appendTerminalText(text) {
            const t = document.getElementById('terminal');
            const s = document.createElement('span');
            if (text.includes('[ERROR]')) s.style.color = 'var(--md-sys-color-error)';
            else if (text.includes('[SUCCESS]')) s.style.color = 'var(--md-custom-color-success)';
            else if (text.includes('[SYSTEM]')) s.style.color = 'var(--md-sys-color-tertiary)';
            else if (text.includes('[INFO]')) s.style.color = 'var(--md-sys-color-primary)';
            s.textContent = text; t.appendChild(s);
            updateLogBadge(text);
            if (document.getElementById('autoscroll-chk').checked) t.scrollTop = t.scrollHeight;
        }
        function clearLogs() { document.getElementById('terminal').innerHTML = ''; document.getElementById('log-badge').textContent = ''; }
        function showLogTerminal() {
            document.getElementById('log-terminal-wrap').style.display = 'block';
            document.getElementById('log-section').classList.add('expanded');
            document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
        }
    </script>
</body>
</html>
